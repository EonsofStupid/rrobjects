# Supply-chain policy for Reason Ready. Enforced in CI by cargo-deny.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Add specific advisory ignores here with a justification comment when needed.
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained (archived), NOT vulnerable.
    # It arrives only transitively through the candle inference stack
    # (gemm -> candle-core -> candle-transformers), which is compiled solely
    # under the optional `candle` feature. The advisory itself states "no safe
    # upgrade is available" — the whole gemm/candle ecosystem still depends on
    # it — so there is nothing to bump. Revisit when candle drops the gemm dep.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive licenses we accept in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Our own proprietary crates.
    "LicenseRef-ReasonReady-Proprietary",
]
confidence-threshold = 0.9
# Our own crates are proprietary (LicenseRef-*) and publish = false; skip them.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
# `allow-wildcard-paths` lets internal path deps use `*`-style version pins.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
